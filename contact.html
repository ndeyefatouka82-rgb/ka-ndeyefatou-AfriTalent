  <!-- Le contenu de la page sera ajoute ici -->

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="index.html">ACCEUIL</a>

      </div>
    </div>
    <!-- dark mood -->
    <button id="btn">
      <i class="fa-solid fa-moon"></i>
    </button>
  </nav>
  <!-- entete -->
  <section class="contact-hero">
    <h1>Contactez AfriTalent</h1>
    <p>Nous sommes à votre écoute pour toute question ou collaboration.</p>
  </section>

  <!-- formulaire -->
  <div class="contact-section">
    <div class="contact-form row">
      <label for="nom">Nom :</label>
      <input type="text" id="nom" name="nom">
      <small class="text-danger" id="errorNom"></small>

      <label for="prenom">Prenom :</label>
      <input type="text" id="prenom" name="prenom">
      <small class="text-danger" id="errorPrenom"></small>

      <label for="mail">Mail :</label>
      <input type="email" id="mail" name="mail">
      <small class="text-danger" id="errorMail"></small>
      <label>Sujet</label>
      <select id="sujet">
        <option value="">Choisir...</option>
        <option>Support</option>
        <option>Information</option>
        <option>Partenariat</option>
      </select>
      <small class="text-danger" id="errorSujet"></small>

      <label for="message">Message :</label>
      <textarea id="message" rows="5"></textarea>
      <small class="text-danger" id="errorMessage"></small>
      <button id="btnEnvoyer">Envoyer</button>
      <p id="successMessage" class="text-success"></p>
    </div>
  </div>


  <!-- INFOS CONTACT -->
  <div class="col-md-6 contact-info">
    <h2>Informations</h2>
    <p><i class="bi bi-envelope-fill"></i>Email : contact@afritalent.com</p>
    <p><i class="bi bi-telephone-fill"></i>Téléphone : +221 77 000 00 00</p>
    <p><i class="bi bi-geo-alt-fill"></i>Adresse : Dakar, Sénégal</p>
  </div>

  <button id="top-btn">↑</button>

  <!-- GOOGLE MAPS -->
  <div class="mt-5">
    <iframe src="https://www.google.com/maps?q=Dakar&output=embed" width="1500" height="200" style="border:0;">
    </iframe>
  </div>

    rel="stylesheet">

</body>
